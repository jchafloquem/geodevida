<div
  id="navbar"
  class="fixed top-0 flex w-full bg-white px-3 h-16 gap-3 items-center z-10 shadow-lg"
>
  <!-- Logo grande -->
  <div class="hidden md:block">
    <img class="h-16" src="assets/images/logodevida.png" alt="Logo grande" />
  </div>

  <!-- Logo pequeño -->
  <div class="block md:hidden">
    <img class="h-14" src="assets/images/logoWelBNMini.png" alt="Logo pequeño" />
  </div>

			<!-- Contenedor centrado para la búsqueda -->
			<div class="flex-1 flex justify-center">
				<div id="searchDiv">
			</div>
  </div>

  <!-- Botón de Logout -->
  <button
		routerLink="/auth/login"
    id="logoutBtn"
    class="bg-[#2091c7] text-white px-4 py-2 rounded-lg hover:bg-[#125230] transition-all flex items-center gap-2"
  >
    🔓 Logout
  </button>
</div>



<!-- Navbar end -->
<script type="text/javascript">
	document.addEventListener("DOMContentLoaded", () => {
		const navbar = document.getElementById("navbar");
		const sidebar = document.getElementById("sidebar");
		const btnSidebarToggler = document.getElementById("btnSidebarToggler");
		const navClosed = document.getElementById("navClosed");
		const navOpen = document.getElementById("navOpen");

		btnSidebarToggler.addEventListener("click", (e) => {
			e.preventDefault();
			sidebar.classList.toggle("show");
			navClosed.classList.toggle("hidden");
			navOpen.classList.toggle("hidden");
		});
		sidebar.style.top = parseInt(navbar.clientHeight) - 1 + "px";
	});
</script>
